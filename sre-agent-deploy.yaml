---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: sre-agent

---
# ServiceAccount with cluster-wide read access (for kubectl investigation)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent-sa
  namespace: sre-agent

---
# ClusterRole: read pods/logs/events + manage deployments for remediation
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-role
rules:
  # Read access for investigation
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Restart/scale deployments for remediation
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-agent-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-agent-role
subjects:
  - kind: ServiceAccount
    name: sre-agent-sa
    namespace: sre-agent

---
# NOTE : le Secret sre-agent-secrets N'EST PLUS declare ici.
# Pourquoi ? Si on le redéclare, chaque `kubectl apply -f sre-agent-deploy.yaml`
# ÉCRASE le ARGOCD_TOKEN avec une valeur vide (bug constaté).
# Le secret est géré séparément par : .\scripts\generate-argocd-token.ps1
# Ce script crée/met à jour le secret et préserve les autres champs.

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-agent-config
  namespace: sre-agent
data:
  OLLAMA_BASE_URL:   "http://host.docker.internal:11434"
  OLLAMA_MODEL:      "mistral"
  ARGOCD_SERVER:     "https://argocd-server.argocd.svc.cluster.local"
  ARGOCD_INSECURE:   "true"
  ARGOCD_APP_NAME:   "demo-app"   # ArgoCD application to sync after auto-remediation
  GITOPS_REPO_PATH:  "/gitops-repo"
  AUTO_REMEDIATE:    "true"       # Phase 3 active: scale/restart + git commit + ArgoCD sync

---
# PersistentVolumeClaim for the local gitops repository clone
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitops-repo-pvc
  namespace: sre-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app: sre-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sre-agent-sa
      containers:
        - name: sre-agent
          image: sre-agent:latest
          imagePullPolicy: Never       # Using local image built with kind load
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sre-agent-config
            - secretRef:
                name: sre-agent-secrets
          volumeMounts:
            - name: gitops-repo
              mountPath: /gitops-repo
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: gitops-repo
          persistentVolumeClaim:
            claimName: gitops-repo-pvc

---
# Service (ClusterIP for internal access + NodePort for local testing)
apiVersion: v1
kind: Service
metadata:
  name: sre-agent-service
  namespace: sre-agent
  labels:
    app: sre-agent
spec:
  selector:
    app: sre-agent
  type: NodePort
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800

---
# ServiceMonitor (Mission 5) — Prometheus scrape l'endpoint /metrics du SRE Agent
# Label `release: monitoring` requis pour que kube-prometheus-stack le découvre
# (matchLabels du serviceMonitorSelector du Prometheus CR).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sre-agent
  namespace: monitoring
  labels:
    release: monitoring
    app: sre-agent
spec:
  namespaceSelector:
    matchNames:
      - sre-agent
  selector:
    matchLabels:
      app: sre-agent
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
