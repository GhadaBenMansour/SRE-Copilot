apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-app
  template:
    metadata:
      labels:
        app: crash-app
    spec:
      containers:
      - name: crash-container
        image: busybox
        command: ["sh", "-c", "exit 1"]
        resources:
          limits:
            memory: "50Mi"