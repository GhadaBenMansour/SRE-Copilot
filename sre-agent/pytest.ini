[pytest]
# Lancement : depuis le dossier sre-agent/, executer `pytest`
# OU depuis la racine du projet : `pytest sre-agent/`
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --basetemp=.pytest-tmp
markers =
    slow: tests qui prennent plus de 1 seconde
    integration: tests qui necessitent kubectl ou Ollama
